<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="signin.css">
</head>
<body>
    <header>
        <div class="logo"><img src="Assets/logo (1).svg"></div>
    </header>
    <div class="container">
        <div class="box1">
        <h1 class="hero_text">Enter your info to sign in</h1>
        <h3 class="under_text">Or get started with a new account.</h3>
        </div>
        <div class="box2">
        <input type="email" placeholder="Email or Mobile number">
        <button>Continue</button>
        <p class="help">Get Help</p>
        <p class="bot">This page is protected by Google reCAPTCHA to ensure you're not a bot.</p>
        </div>
    </div>
    <footer>
        <main>
            <div class="ques">
                <p>Questions? Call 000-800-919-1743 (Toll-Free)</p>
            </div>
            <div class="grid">
                <a href="#">FAQ</a>
                <a href="#">Help Centre</a>
                <a href="#">Terms of use</a>
                <a href="#">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="#">Corporate information</a>
            </div>
            <div class="lang">
                <button>
                    English
                </button>
            </div>
        </main>
    </footer>
</body>
</html>
